spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 500 # 한 번 조회시 세트로 조회
    open-in-view: false # OSIV 비활성화: 서비스 종료 시점에 세션 종료 → 뷰에서의 지연 로딩 방지 및 DB 커넥션 반환
  data:
    redis:
      host: localhost
      port: 6382
      database: 0

server:
  port: 11002
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

cloud:
  aws:
    credentials:
      access-key: ${ACCESS_KEY}
      secret-key: ${SECRET_KEY}
    s3:
      bucket-name: musinsam-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false

file:
  image-extension: jpg, jpeg, png, gif